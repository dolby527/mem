# MEM demo/staging on Render — https://render.com/docs/blueprint-spec
# mem-db: Dashboard에 이미 있으면 Blueprint Sync 시 연결됩니다.
# Free tier DB가 없을 때만 새로 생성 시도합니다.
# Docs: docs/deploy/RENDER.md

envVarGroups:
  - name: mem-shared
    envVars:
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: mem-db
    plan: free
    databaseName: mem
    user: mem

services:
  - type: web
    name: mem-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.9 --activate &&
      pnpm install --frozen-lockfile --prod=false &&
      pnpm --filter @mem/api build
    startCommand: NODE_ENV=production pnpm --filter @mem/api start:render
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mem-db
          property: connectionString
      - fromGroup: mem-shared
      - key: HEALTH_CHECK_SIMULATE
        value: "true"
      - key: COOKIE_DOMAIN
        value: local
      - key: COOKIE_SAMESITE
        value: lax
      # After first deploy, set to mem-web URL (Dashboard → mem-api → Environment)
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: mem-web
    runtime: node
    plan: free
    region: singapore
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.9 --activate &&
      pnpm install --frozen-lockfile --prod=false &&
      pnpm --filter @mem/web build
    startCommand: NODE_ENV=production pnpm --filter @mem/web start
    healthCheckPath: /login
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: /mem-api
      - key: API_INTERNAL_URL
        fromService:
          name: mem-api
          type: web
          property: hostport
      - fromGroup: mem-shared
      - key: NEXT_PUBLIC_DEV_HOSPITAL_SLUG
        value: asan
